# ── Decern Self-Hosted ──
# This file is for CUSTOMERS deploying Decern on their infrastructure.
# They pull the pre-built image from ghcr.io — no source code needed.
#
# Quick start:
#   1. Copy .env.example to .env and fill in the values
#   2. docker compose up -d
#   3. Run migrations against your Supabase instance
#   4. Open http://localhost:3000

services:
  decern:
    image: ghcr.io/decernhq/decern:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_SELF_HOSTED=true
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
